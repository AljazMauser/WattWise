version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wattwise_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wattwise_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wattwise_password}
      POSTGRES_DB: ${POSTGRES_DB:-wattwise_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: wattwise_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://wattwise_user:wattwise_password@db:5432/wattwise_db}
      SECRET_KEY: ${SECRET_KEY:-default_secret_key_change_in_production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wattwise_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
